name: "Build Desktop Installers"

on:
  push:
    branches:
      - main  # Triggers the cloud compiler every time you push code changes to main

jobs:
  compile-windows:
    runs-on: windows-latest # Tells GitHub to spin up a native cloud Windows machine

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust Compiler
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Packages
        run: npm install

      - name: Execute Production Tauri Build
        run: npx tauri build --bundles msi,nsis

      - name: Upload Windows Installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: src-tauri/target/release/bundle/
