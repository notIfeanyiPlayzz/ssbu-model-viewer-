<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSBU Model Viewer</title>
    <style>
      body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #111; color: #eee;
      }
      #app { display: flex; width: 100vw; height: 100vh; }
      #sidebar {
        width: 320px; background: #1c1c1e; padding: 20px;
        box-sizing: border-box; display: flex; flex-direction: column;
        gap: 15px; border-right: 1px solid #2c2c2e; z-index: 10;
      }
      #canvas-container { flex-grow: 1; height: 100%; position: relative; }
      h2, h3 { margin: 0; padding: 0; color: #fff; font-weight: 600; }
      h2 { font-size: 1.2rem; } h3 { font-size: 0.9rem; text-transform: uppercase; color: #8e8e93; letter-spacing: 0.5px; }
      p { margin: 0; font-size: 0.85rem; color: #aeaeb2; line-height: 1.4; }
      .btn {
        width: 100%; padding: 12px; background: #0a84ff; color: #fff;
        border: none; border-radius: 6px; cursor: pointer; font-weight: 600;
        font-size: 0.9rem; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
      }
      .btn:hover { background: #0066cc; }
      #file-list {
        flex-grow: 1; border: 1px solid #2c2c2e; border-radius: 6px;
        background: #2c2c2e; margin: 0; padding: 10px; list-style: none;
        overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
      }
      .file-item {
        font-size: 0.8rem; padding: 6px 8px; background: #1c1c1e;
        border-radius: 4px; border-left: 3px solid #30d158;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="sidebar">
        <h2>ssbu-model-viewer</h2>
        <p>Import a native ARCropolis character mod folder folder to visualize game models.</p>
        <button class="btn" id="import-btn">📁 Import Mod Folder</button>
        <h3>Detected Mod Files</h3>
        <ul id="file-list">
          <p style="text-align: center; padding-top: 20px;">No folder imported yet.</p>
        </ul>
      </div>
      <div id="canvas-container"></div>
    </div>
    <script type="module" src="/src/types.ts"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
